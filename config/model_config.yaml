model:
  base_model: "meta-llama/Meta-Llama-3-8B-Instruct"  # Downloaded once, stored in HF cache
  adapter_path: "./models/Medical_Llama_Adapter"       # Your local PEFT fine-tuned adapter
  max_seq_length: 2048
  load_in_4bit: true  # Only applied on CUDA (Linux/NVIDIA). Mac uses fp16/MPS automatically.

generation:
  max_new_tokens: 512
  use_cache: true
  temperature: 0.1  # Low temperature for clinical accuracy
  top_p: 0.9

prompts:
  alpaca_template: |
    Below is a medical report containing technical jargon. Rewrite it in simple, patient-friendly language.
    
    ### Medical Report:
    {}
    
    ### Simplified Explanation:
    {}
