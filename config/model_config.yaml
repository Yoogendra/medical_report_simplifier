model:
  base_model: "unsloth/llama-3-8b-Instruct-bnb-4bit"
  adapter_path: "./models/Medical_Llama_Adapter"  # Local offline path
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null

generation:
  max_new_tokens: 512
  use_cache: true
  temperature: 0.1  # Low temperature for clinical accuracy
  top_p: 0.9

prompts:
  alpaca_template: |
    Below is a medical report containing technical jargon. Rewrite it in simple, patient-friendly language.
    
    ### Medical Report:
    {}
    
    ### Simplified Explanation:
    {}
